<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Selecciona una región</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; background: #000; }
    #screen {
      position: fixed; inset: 0; width: 100%; height: 100%;
      -webkit-user-drag: none; user-select: none; pointer-events: none;
    }
    #dim { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); }
    #sel {
      position: fixed; display: none;
      border: 2px solid #d97757;
      background: rgba(217, 119, 87, 0.08);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
    }
    #sel.active + #dim, #dim.off { display: none; }
    #size {
      position: fixed; display: none;
      background: #1f1e1d; color: #faf9f5;
      font: 12px "Segoe UI", sans-serif;
      padding: 3px 8px; border-radius: 6px; pointer-events: none;
    }
    #help {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(31, 30, 29, 0.92); color: #faf9f5;
      font: 13px "Segoe UI", sans-serif;
      padding: 8px 18px; border-radius: 10px; pointer-events: none;
    }
    #help b { color: #d97757; }
  </style>
</head>
<body>
  <img id="screen" alt="" draggable="false" />
  <div id="dim"></div>
  <div id="sel"></div>
  <div id="size"></div>
  <div id="help">Arrastra para seleccionar · <b>Esc</b> para cancelar</div>
  <script src="overlay.js"></script>
</body>
</html>
